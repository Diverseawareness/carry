<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You're Invited — Carry</title>
    <meta name="description" content="You've been invited to a skins game on Carry.">
    <meta name="theme-color" content="#1A1A1A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="appicon.png">
    <link rel="apple-touch-icon" href="appicon.png">

    <!-- Open Graph -->
    <meta property="og:title" content="You're Invited — Carry">
    <meta property="og:description" content="Join a skins game on Carry. Track skins. Settle up. Play on.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://carryapp.site/invite">

    <style>
        :root {
            --black: #1A1A1A;
            --white: #FFFFFF;
            --green-dark: #064102;
            --green-light: #BCF0B5;
            --gray-400: #999999;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font);
            background: var(--black);
            color: var(--white);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .invite-card {
            max-width: 360px;
            width: 100%;
        }
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 17px;
            color: var(--gray-400);
            line-height: 1.5;
            margin-bottom: 40px;
        }
        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: var(--green-light);
            color: var(--green-dark);
            font-size: 17px;
            font-weight: 700;
            border-radius: 14px;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .cta-button:hover { opacity: 0.85; }
        .cta-button svg { flex-shrink: 0; }
        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: var(--gray-400);
        }
        .footer-text a {
            color: var(--gray-400);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <img src="appicon.png" alt="Carry" class="app-icon">
        <h1>You're Invited</h1>
        <p class="subtitle">You've been invited to a skins game on Carry. Download the app to join.</p>

        <!-- App Store link — update href after Apple assigns ID -->
        <a id="cta" href="https://apps.apple.com/app/carry/id6760993864" class="cta-button">
            <svg width="20" height="24" viewBox="0 0 17 20" fill="#064102"><path d="M13.545 10.418c-.024-2.524 2.06-3.732 2.153-3.792-1.17-1.713-2.997-1.947-3.647-1.974-1.552-.157-3.03.914-3.818.914-.788 0-2.003-.891-3.293-.867-1.695.024-3.259.986-4.132 2.506-1.762 3.057-.451 7.586 1.266 10.066.839 1.213 1.84 2.575 3.154 2.527 1.265-.051 1.743-.818 3.273-.818 1.53 0 1.96.818 3.29.793 1.361-.024 2.224-1.237 3.06-2.452.964-1.406 1.362-2.767 1.386-2.838-.03-.014-2.659-1.021-2.685-4.05v-.015zM11.015 3.082c.698-.846 1.168-2.021 1.04-3.193-1.004.041-2.22.669-2.94 1.514-.647.749-1.213 1.947-1.062 3.096 1.121.087 2.264-.569 2.962-1.417z"/></svg>
            Download Carry on the App Store
        </a>

        <p class="footer-text">Free to download · <a href="/">Learn more</a></p>
    </div>

    <script>
        // Try to open the app via deep link on iOS
        (function() {
            var params = new URLSearchParams(window.location.search);
            var groupId = params.get('group');
            if (groupId && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
                // Attempt deep link — if app is installed, iOS will open it
                // If not, nothing happens and user sees the download page
                var deepLink = 'carry://join-group?id=' + encodeURIComponent(groupId);
                window.location.href = deepLink;
            }
        })();
    </script>
</body>
</html>
