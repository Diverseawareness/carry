<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradientM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadowM">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGradientM)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="200" r="100" fill="#4CF7B8" opacity="0.06"/>
  <circle cx="880" cy="850" r="140" fill="#D4A017" opacity="0.05"/>

  <!-- Month label -->
  <text x="512" y="180" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#4CF7B8" text-anchor="middle" letter-spacing="4">MONTH TO MONTH</text>

  <!-- Main headline -->
  <text x="512" y="310" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="110" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">Flex it.</text>
  <text x="512" y="430" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="110" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">Keep it.</text>

  <!-- Round result card mockup -->
  <rect x="162" y="500" width="700" height="360" rx="32" fill="#FAFAFA" filter="url(#shadowM)"/>

  <!-- Winner hero in card -->
  <circle cx="512" cy="600" r="52" fill="#D4A017"/>
  <text x="512" y="615" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">JS</text>

  <!-- Trophy icon overlay -->
  <circle cx="560" cy="560" r="22" fill="#C4A450"/>
  <text x="560" y="569" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle">★</text>

  <text x="512" y="696" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1A1A1A" text-anchor="middle">Jake S.</text>

  <!-- Stats row -->
  <g font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif">
    <text x="325" y="756" font-size="20" font-weight="500" fill="#999999" text-anchor="middle">SKINS</text>
    <text x="325" y="802" font-size="42" font-weight="800" fill="#1A1A1A" text-anchor="middle">6</text>

    <rect x="450" y="740" width="1" height="70" fill="#E5E5E5"/>

    <text x="512" y="756" font-size="20" font-weight="500" fill="#999999" text-anchor="middle">WON</text>
    <text x="512" y="802" font-size="42" font-weight="800" fill="#C4A450" text-anchor="middle">+$72</text>

    <rect x="575" y="740" width="1" height="70" fill="#E5E5E5"/>

    <text x="700" y="756" font-size="20" font-weight="500" fill="#999999" text-anchor="middle">ROUND</text>
    <text x="700" y="802" font-size="42" font-weight="800" fill="#1A1A1A" text-anchor="middle">74</text>
  </g>

  <!-- Bottom tagline -->
  <text x="512" y="940" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#4CF7B8" text-anchor="middle" opacity="0.9">7-day trial · Cancel anytime</text>
</svg>
